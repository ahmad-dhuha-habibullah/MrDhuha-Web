backend:
  name: github
  repo: ahmad-dhuha-habibullah/MrDhuha-Web
  branch: add-sveltia-cms
  pkce: true

media_folder: "src/assets/images"
public_folder: "/assets/images"

preview_styles:
  - "/assets/css/style.css"
  - "/assets/css/admin.css"

collections:
  - name: "pages"
    label: "Halaman Statis"
    files:
      - label: "Beranda (Home)"
        name: "home"
        file: "src/index.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/home.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtitle", name: "hero_subtitle", widget: "text"}
          - {label: "Hero Image", name: "hero_image", widget: "image", required: false}
          - {label: "Hero Video (WebM)", name: "hero_video", widget: "file", required: false}
          - {label: "Section: Artikel Terbaru", name: "section_articles_title", widget: "string", default: "Artikel Terbaru"}
          - {label: "Section: Video Terbaru", name: "section_videos_title", widget: "string", default: "Video Terbaru"}
          - {label: "Section: Jelajahi Topik", name: "section_topics_title", widget: "string", default: "Jelajahi Topik"}
          - {label: "Section: Seri Unggulan", name: "section_series_title", widget: "string", default: "Seri Unggulan"}
          - {label: "Body", name: "body", widget: "markdown", required: false}
      
      - label: "Halaman Artikel"
        name: "articles_page"
        file: "src/artikel.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/artikel_page.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Halaman Video"
        name: "videos_page"
        file: "src/video.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/video_page.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Halaman Topik"
        name: "topics_page"
        file: "src/topik.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/topik_page.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Halaman Series"
        name: "series_page"
        file: "src/seri.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/seri_page.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Halaman Eksplorasi"
        name: "explorations_page"
        file: "src/eksplorasi.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/eksplorasi_page.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}
          - {label: "Body", name: "body", widget: "markdown", required: false}

      - label: "Halaman Tentang"
        name: "about_page"
        file: "src/content/about/tentang/index.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/tentang/"}
          - {label: "Type", name: "type", widget: "hidden", default: "page"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "series"
    label: "Series"
    folder: "src/content/series"
    create: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/series.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Thumbnail", name: "thumbnail", widget: "image", required: false}
      - {label: "Hero Image", name: "heroImage", widget: "image", required: false, hint: "Banner besar di halaman seri. Jika kosong akan memakai thumbnail."}
      - {label: "Stats", name: "stats", widget: "string", required: false}
      - label: "Series Contents"
        name: "itemList"
        widget: "list"
        required: false
        types:
          - label: "Article"
            name: "article"
            widget: "object"
            fields:
              - {label: "Article", name: "item", widget: "relation", collection: "articles", value_field: "title", search_fields: ["title"], display_fields: ["title"]}
          - label: "Video"
            name: "video"
            widget: "object"
            fields:
              - {label: "Video", name: "item", widget: "relation", collection: "videos", value_field: "title", search_fields: ["title"], display_fields: ["title"]}
      - {label: "Body", name: "body", widget: "markdown", required: false}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", required: false}

  - name: "topics"
    label: "Topics"
    folder: "src/content/topics"
    create: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/topic.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Thumbnail", name: "thumbnail", widget: "image", required: false}
      - label: "Topic Contents"
        name: "itemList"
        widget: "list"
        required: false
        types:
          - label: "Article"
            name: "article"
            widget: "object"
            fields:
              - {label: "Article", name: "item", widget: "relation", collection: "articles", value_field: "title", search_fields: ["title"], display_fields: ["title"]}
          - label: "Video"
            name: "video"
            widget: "object"
            fields:
              - {label: "Video", name: "item", widget: "relation", collection: "videos", value_field: "title", search_fields: ["title"], display_fields: ["title"]}
      - {label: "Body", name: "body", widget: "markdown", required: false}

  - name: "videos"
    label: "Videos"
    folder: "src/content/videos"
    create: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/video.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Thumbnail", name: "thumbnail", widget: "image"}
      - {label: "Author", name: "author", widget: "string", default: "Mr Dhuha"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Duration", name: "duration", widget: "string"}
      - {label: "YouTube ID", name: "youtube", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Thumbnail", name: "thumbnail", widget: "image"}
      - {label: "Image Caption", name: "imageCaption", widget: "string", required: false}
      - {label: "Author", name: "author", widget: "string", default: "Mr Dhuha"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Reading Time (mins)", name: "readingTime", widget: "number"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "explorations"
    label: "Explorations"
    folder: "src/content/explorations"
    create: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/eksplorasi.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Thumbnail", name: "thumbnail", widget: "image"}
      - {label: "Hero Image", name: "heroImage", widget: "image", required: false}
      - {label: "Type", name: "type", widget: "string", default: "Data Interaktif"}
      - {label: "Iframe URL or Path (e.g. https://... or /assets/sim.html)", name: "iframe", widget: "string", required: false, hint: "Paste a live URL or the path to an uploaded HTML file."}
      - {label: "Body (Description)", name: "body", widget: "markdown", required: false}

  - name: "settings"
    label: "Settings"
    files:
      - label: "Announcement Bar"
        name: "announcement"
        file: "src/_data/announcement.json"
        fields:
          - {label: "Enabled", name: "enabled", widget: "boolean", default: false, required: false}
          - {label: "Text", name: "text", widget: "string"}
          - {label: "Background Color", name: "background_color", widget: "color", default: "#1e293b", required: false}
          - {label: "Closable", name: "closable", widget: "boolean", default: true, required: false}
          - {label: "Link URL", name: "link_url", widget: "string", required: false}
          - {label: "Link Text", name: "link_text", widget: "string", required: false}
      - label: "Promo CTA"
        name: "promo"
        file: "src/_data/promo.json"
        fields:
          - {label: "Enabled", name: "enabled", widget: "boolean", default: false}
          - {label: "Heading", name: "heading", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "CTA URL", name: "cta_url", widget: "string"}
          - {label: "Image", name: "image", widget: "image", required: false}
