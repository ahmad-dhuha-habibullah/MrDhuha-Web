backend:
  name: github
  repo: ahmad-dhuha-habibullah/MrDhuha-Web
  branch: main
  pkce: true

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Halaman Statis"
    files:
      - label: "Beranda (Home)"
        name: "home"
        file: "src/index.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtitle", name: "hero_subtitle", widget: "text"}
      
      - label: "Halaman Artikel"
        name: "articles_page"
        file: "src/artikel.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}

      - label: "Halaman Video"
        name: "videos_page"
        file: "src/video.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}

      - label: "Halaman Topik"
        name: "topics_page"
        file: "src/topik.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}

      - label: "Halaman Series"
        name: "series_page"
        file: "src/seri.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}

      - label: "Halaman Eksplorasi"
        name: "explorations_page"
        file: "src/eksplorasi.njk"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.njk"}
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "Page Heading", name: "page_heading", widget: "string"}
          - {label: "Page Description", name: "page_description", widget: "text"}

      - label: "Halaman Tentang"
        name: "about_page"
        file: "src/content/about/tentang/index.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/tentang/"}
          - {label: "Type", name: "type", widget: "hidden", default: "page"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "videos"
    label: "Videos"
    folder: "src/content/videos"
    create: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/video.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Thumbnail", name: "thumbnail", widget: "image"}
      - {label: "Author", name: "author", widget: "string", default: "Mr Dhuha"}
      - {label: "Topic", name: "topic", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Duration", name: "duration", widget: "string"}
      - {label: "YouTube ID", name: "youtube", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Thumbnail", name: "thumbnail", widget: "image"}
      - {label: "Image Caption", name: "imageCaption", widget: "string", required: false}
      - {label: "Series", name: "series", widget: "string", required: false}
      - {label: "Author", name: "author", widget: "string", default: "Mr Dhuha"}
      - {label: "Topic", name: "topic", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Reading Time (mins)", name: "readingTime", widget: "number"}
      - {label: "Body", name: "body", widget: "markdown"}
