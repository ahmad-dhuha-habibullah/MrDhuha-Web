<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Sveltia CMS</title>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Sveltia CMS -->
    <script type="module" src="https://unpkg.com/@sveltia/cms@0.166.1/dist/sveltia-cms.js"></script>
    <script>
      // Wait for Sveltia CMS to initialize and register preview styles
      const initCMS = setInterval(() => {
        if (window.CMS) {
          window.CMS.registerPreviewStyle("/assets/css/style.css");
          window.CMS.registerPreviewStyle("/assets/css/admin.css");
          clearInterval(initCMS);
        }
      }, 100);
    </script>
  </body>
</html>
